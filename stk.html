<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STK单独展示页面</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      margin-bottom: 20px;
      font-size: 32px;
    }

    .video-container {
      width: 80%;
      margin: 0 auto 40px auto;
    }

    video {
      width: 100%;
      max-width: 1000px;
      border: 2px solid white;
      border-radius: 10px;
      background: black;
    }
  </style>
</head>
<body>
  <h1>STK视频展示</h1>

  <div class="video-container">
    <video controls>
      <source src="STK.mp4" type="video/mp4">
      你的浏览器不支持 video 标签。
    </video>
  </div>
</body>
</html>
